<svg width="800" height="320" viewBox="0 0 800 320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0c29"/>
      <stop offset="50%" style="stop-color:#1a1040"/>
      <stop offset="100%" style="stop-color:#0d0b26"/>
    </linearGradient>
    <linearGradient id="accent1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>
    <linearGradient id="glow1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:0"/>
    </linearGradient>
    <filter id="blur1">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="320" fill="url(#bg1)" rx="16"/>

  <!-- Glow blob -->
  <ellipse cx="680" cy="80" rx="160" ry="120" fill="#7c3aed" opacity="0.12" filter="url(#blur1)"/>
  <ellipse cx="100" cy="240" rx="100" ry="80" fill="#4c1d95" opacity="0.15" filter="url(#blur1)"/>

  <!-- Stars -->
  <circle cx="50" cy="30" r="1.2" fill="#c4b5fd" opacity="0.8"/>
  <circle cx="120" cy="60" r="0.8" fill="#c4b5fd" opacity="0.6"/>
  <circle cx="200" cy="20" r="1" fill="#c4b5fd" opacity="0.7"/>
  <circle cx="350" cy="40" r="0.7" fill="#c4b5fd" opacity="0.5"/>
  <circle cx="500" cy="15" r="1.2" fill="#c4b5fd" opacity="0.8"/>
  <circle cx="620" cy="35" r="0.9" fill="#c4b5fd" opacity="0.6"/>
  <circle cx="730" cy="20" r="1" fill="#c4b5fd" opacity="0.7"/>
  <circle cx="780" cy="55" r="0.7" fill="#c4b5fd" opacity="0.5"/>
  <circle cx="440" cy="290" r="1" fill="#c4b5fd" opacity="0.4"/>
  <circle cx="560" cy="310" r="0.8" fill="#c4b5fd" opacity="0.3"/>
  <circle cx="160" cy="300" r="1.1" fill="#c4b5fd" opacity="0.5"/>

  <!-- Border -->
  <rect width="800" height="320" fill="none" stroke="#7c3aed" stroke-width="1.5" rx="16" opacity="0.5"/>
  <!-- Top accent line -->
  <rect x="0" y="0" width="800" height="3" fill="url(#accent1)" rx="2" opacity="0.9"/>

  <!-- Satellite icon (right side) -->
  <!-- Satellite body -->
  <g transform="translate(650, 120) rotate(-25)">
    <rect x="-18" y="-10" width="36" height="20" rx="4" fill="#2d1b69" stroke="#7c3aed" stroke-width="1.5"/>
    <!-- Solar panels left -->
    <rect x="-58" y="-7" width="36" height="14" rx="2" fill="#1e1255" stroke="#6d28d9" stroke-width="1"/>
    <line x1="-40" y1="-7" x2="-40" y2="7" stroke="#7c3aed" stroke-width="0.8" opacity="0.7"/>
    <line x1="-32" y1="-7" x2="-32" y2="7" stroke="#7c3aed" stroke-width="0.8" opacity="0.7"/>
    <!-- Solar panels right -->
    <rect x="22" y="-7" width="36" height="14" rx="2" fill="#1e1255" stroke="#6d28d9" stroke-width="1"/>
    <line x1="30" y1="-7" x2="30" y2="7" stroke="#7c3aed" stroke-width="0.8" opacity="0.7"/>
    <line x1="38" y1="-7" x2="38" y2="7" stroke="#7c3aed" stroke-width="0.8" opacity="0.7"/>
    <!-- Antenna -->
    <line x1="0" y1="-10" x2="0" y2="-28" stroke="#a78bfa" stroke-width="1.5"/>
    <circle cx="0" cy="-30" r="3" fill="none" stroke="#a78bfa" stroke-width="1.5"/>
    <!-- Signal waves -->
    <path d="M-12,-42 Q0,-52 12,-42" fill="none" stroke="#a78bfa" stroke-width="1.2" opacity="0.7"/>
    <path d="M-20,-50 Q0,-65 20,-50" fill="none" stroke="#a78bfa" stroke-width="1" opacity="0.4"/>
  </g>

  <!-- Orbit ring around satellite -->
  <ellipse cx="660" cy="150" rx="90" ry="30" fill="none" stroke="#7c3aed" stroke-width="1" stroke-dasharray="4,3" opacity="0.35"/>

  <!-- Signal dots from satellite downward -->
  <circle cx="640" cy="210" r="2.5" fill="#a78bfa" opacity="0.6"/>
  <circle cx="630" cy="230" r="2" fill="#a78bfa" opacity="0.4"/>
  <circle cx="620" cy="248" r="1.5" fill="#a78bfa" opacity="0.25"/>

  <!-- Left side content -->
  <!-- Tag -->
  <rect x="30" y="28" width="130" height="24" rx="12" fill="#2d1b69" stroke="#7c3aed" stroke-width="1"/>
  <text x="95" y="44" font-family="monospace" font-size="11" fill="#a78bfa" text-anchor="middle">🛰️ RAG · NLP · AI</text>

  <!-- Title -->
  <text x="30" y="100" font-family="'Courier New', monospace" font-size="30" font-weight="bold" fill="#ffffff" letter-spacing="1">Antariksh Saathi</text>
  <text x="30" y="126" font-family="monospace" font-size="13" fill="#c4b5fd" opacity="0.8">MOSDAC RAG System</text>

  <!-- Divider -->
  <rect x="30" y="140" width="320" height="1.5" fill="url(#accent1)" rx="1" opacity="0.6"/>

  <!-- STAR content -->
  <text x="30" y="165" font-family="monospace" font-size="11" fill="#7c3aed" font-weight="bold">📍 SITUATION</text>
  <text x="30" y="181" font-family="monospace" font-size="10.5" fill="#c4b5fd" opacity="0.85">MOSDAC satellite data had no natural language interface —</text>
  <text x="30" y="196" font-family="monospace" font-size="10.5" fill="#c4b5fd" opacity="0.85">inaccessible to non-expert users.</text>

  <text x="30" y="218" font-family="monospace" font-size="11" fill="#7c3aed" font-weight="bold">⚙️  ACTION</text>
  <text x="30" y="234" font-family="monospace" font-size="10.5" fill="#c4b5fd" opacity="0.85">▸ Crawler pipeline → vector embeddings → RAG agent</text>
  <text x="30" y="249" font-family="monospace" font-size="10.5" fill="#c4b5fd" opacity="0.85">▸ Hallucination mitigation + web app + browser extension</text>

  <text x="30" y="272" font-family="monospace" font-size="11" fill="#22c55e" font-weight="bold">✅ RESULT</text>
  <text x="30" y="288" font-family="monospace" font-size="10.5" fill="#86efac" opacity="0.9">&lt;5% hallucination rate · sub-second semantic retrieval</text>

  <!-- Tech pills -->
  <rect x="30" y="300" width="72" height="16" rx="8" fill="#1e1255" stroke="#7c3aed" stroke-width="0.8"/>
  <text x="66" y="312" font-family="monospace" font-size="9" fill="#a78bfa" text-anchor="middle">LangChain</text>
  <rect x="110" y="300" width="62" height="16" rx="8" fill="#1e1255" stroke="#7c3aed" stroke-width="0.8"/>
  <text x="141" y="312" font-family="monospace" font-size="9" fill="#a78bfa" text-anchor="middle">Pinecone</text>
  <rect x="180" y="300" width="52" height="16" rx="8" fill="#1e1255" stroke="#7c3aed" stroke-width="0.8"/>
  <text x="206" y="312" font-family="monospace" font-size="9" fill="#a78bfa" text-anchor="middle">Python</text>
  <rect x="240" y="300" width="36" height="16" rx="8" fill="#1e1255" stroke="#7c3aed" stroke-width="0.8"/>
  <text x="258" y="312" font-family="monospace" font-size="9" fill="#a78bfa" text-anchor="middle">NLP</text>
</svg>
