<svg width="800" height="320" viewBox="0 0 800 320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0f0a"/>
      <stop offset="50%" style="stop-color:#1f1410"/>
      <stop offset="100%" style="stop-color:#150c08"/>
    </linearGradient>
    <linearGradient id="accent5" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ef4444"/>
      <stop offset="50%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <linearGradient id="chartgrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#ef4444;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#ef4444;stop-opacity:0.8"/>
    </linearGradient>
    <linearGradient id="chartline" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#22c55e"/>
      <stop offset="50%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#ef4444"/>
    </linearGradient>
    <filter id="blur5">
      <feGaussianBlur stdDeviation="20"/>
    </filter>
    <filter id="glow5">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="320" fill="url(#bg5)" rx="16"/>

  <!-- Glow blobs -->
  <ellipse cx="680" cy="100" rx="140" ry="100" fill="#ef4444" opacity="0.06" filter="url(#blur5)"/>
  <ellipse cx="120" cy="220" rx="120" ry="90" fill="#f59e0b" opacity="0.08" filter="url(#blur5)"/>

  <!-- Stock chart visualization (right side) -->
  <!-- Chart area -->
  <rect x="480" y="40" width="290" height="240" rx="8" fill="#1a0f0a" stroke="#ef4444" stroke-width="1" opacity="0.6"/>
  
  <!-- Grid lines -->
  <g opacity="0.15" stroke="#ef4444" stroke-width="0.5">
    <line x1="480" y1="80" x2="770" y2="80"/>
    <line x1="480" y1="120" x2="770" y2="120"/>
    <line x1="480" y1="160" x2="770" y2="160"/>
    <line x1="480" y1="200" x2="770" y2="200"/>
    <line x1="480" y1="240" x2="770" y2="240"/>
  </g>

  <!-- Candlestick chart -->
  <!-- Candle 1 - Green (bullish) -->
  <line x1="510" y1="180" x2="510" y2="140" stroke="#22c55e" stroke-width="1.5"/>
  <rect x="505" y="155" width="10" height="25" fill="#22c55e" rx="1"/>
  
  <!-- Candle 2 - Red (bearish) -->
  <line x1="540" y1="160" x2="540" y2="200" stroke="#ef4444" stroke-width="1.5"/>
  <rect x="535" y="165" width="10" height="35" fill="#ef4444" rx="1"/>
  
  <!-- Candle 3 - Green -->
  <line x1="570" y1="170" x2="570" y2="130" stroke="#22c55e" stroke-width="1.5"/>
  <rect x="565" y="140" width="10" height="30" fill="#22c55e" rx="1"/>
  
  <!-- Candle 4 - Red (large) -->
  <line x1="600" y1="140" x2="600" y2="220" stroke="#ef4444" stroke-width="1.5"/>
  <rect x="595" y="150" width="10" height="70" fill="#ef4444" rx="1"/>
  
  <!-- Candle 5 - Small green -->
  <line x1="630" y1="190" x2="630" y2="170" stroke="#22c55e" stroke-width="1.5"/>
  <rect x="625" y="175" width="10" height="15" fill="#22c55e" rx="1"/>
  
  <!-- Candle 6 - Red with wick -->
  <line x1="660" y1="155" x2="660" y2="215" stroke="#ef4444" stroke-width="1.5"/>
  <rect x="655" y="165" width="10" height="50" fill="#ef4444" rx="1"/>
  
  <!-- Candle 7 - Green breakout -->
  <line x1="690" y1="180" x2="690" y2="100" stroke="#22c55e" stroke-width="2"/>
  <rect x="685" y="120" width="10" height="60" fill="#22c55e" rx="1"/>
  
  <!-- Candle 8 - Red pullback -->
  <line x1="720" y1="130" x2="720" y2="190" stroke="#ef4444" stroke-width="1.5"/>
  <rect x="715" y="140" width="10" height="50" fill="#ef4444" rx="1"/>

  <!-- Anomaly detection highlights -->
  <circle cx="600" cy="185" r="12" fill="none" stroke="#f59e0b" stroke-width="2" stroke-dasharray="3,2" opacity="0.8"/>
  <text x="600" y="212" font-family="monospace" font-size="8" fill="#f59e0b" text-anchor="middle" opacity="0.9">ANOMALY</text>
  
  <circle cx="660" cy="190" r="12" fill="none" stroke="#f59e0b" stroke-width="2" stroke-dasharray="3,2" opacity="0.8"/>
  <text x="660" y="217" font-family="monospace" font-size="8" fill="#f59e0b" text-anchor="middle" opacity="0.9">DETECTED</text>

  <!-- RAG/AI indicator -->
  <g transform="translate(745, 65)">
    <circle cx="0" cy="0" r="18" fill="#1a0f0a" stroke="#7c3aed" stroke-width="1.5"/>
    <text x="0" y="-3" font-family="monospace" font-size="9" fill="#a78bfa" text-anchor="middle">RAG</text>
    <text x="0" y="8" font-family="monospace" font-size="7" fill="#a78bfa" text-anchor="middle">+AI</text>
  </g>

  <!-- Trend line overlay -->
  <polyline points="510,167 540,182 570,155 600,185 630,182 660,190 690,150 720,165" 
    fill="none" stroke="url(#chartline)" stroke-width="2" opacity="0.7" stroke-dasharray="4,3"/>

  <!-- Border -->
  <rect width="800" height="320" fill="none" stroke="#ef4444" stroke-width="1.5" rx="16" opacity="0.35"/>
  <rect x="0" y="0" width="800" height="3" fill="url(#accent5)" rx="2" opacity="0.9"/>

  <!-- Tag -->
  <rect x="30" y="28" width="180" height="24" rx="12" fill="#1a0f0a" stroke="#ef4444" stroke-width="1"/>
  <text x="120" y="44" font-family="monospace" font-size="11" fill="#f87171" text-anchor="middle">📈 RAG · Perplexity · Finance</text>

  <!-- Title -->
  <text x="30" y="100" font-family="'Courier New', monospace" font-size="28" font-weight="bold" fill="#ffffff" letter-spacing="1">InsideX</text>
  <text x="30" y="126" font-family="monospace" font-size="13" fill="#fca5a5" opacity="0.8">RAG + Perplexity Detector</text>

  <!-- Divider -->
  <rect x="30" y="140" width="340" height="1.5" fill="url(#accent5)" rx="1" opacity="0.6"/>

  <!-- STAR content -->
  <text x="30" y="165" font-family="monospace" font-size="11" fill="#ef4444" font-weight="bold">📍 SITUATION</text>
  <text x="30" y="181" font-family="monospace" font-size="10.5" fill="#fecaca" opacity="0.85">Financial markets generate massive data —</text>
  <text x="30" y="196" font-family="monospace" font-size="10.5" fill="#fecaca" opacity="0.85">anomalies are buried in noise, hard to detect.</text>

  <text x="30" y="218" font-family="monospace" font-size="11" fill="#ef4444" font-weight="bold">⚙️  ACTION</text>
  <text x="30" y="234" font-family="monospace" font-size="10.5" fill="#fecaca" opacity="0.85">▸ RAG pipeline over financial docs + Perplexity</text>
  <text x="30" y="249" font-family="monospace" font-size="10.5" fill="#fecaca" opacity="0.85">▸ Time-series anomaly detection with LLM context</text>

  <text x="30" y="272" font-family="monospace" font-size="11" fill="#22c55e" font-weight="bold">✅ RESULT</text>
  <text x="30" y="288" font-family="monospace" font-size="10.5" fill="#86efac" opacity="0.9">Real-time anomaly alerts · LLM-explained signals</text>

  <!-- Tech pills -->
  <rect x="30" y="300" width="68" height="16" rx="8" fill="#1a0f0a" stroke="#ef4444" stroke-width="0.8"/>
  <text x="64" y="312" font-family="monospace" font-size="9" fill="#f87171" text-anchor="middle">LangChain</text>
  <rect x="106" y="300" width="74" height="16" rx="8" fill="#1a0f0a" stroke="#ef4444" stroke-width="0.8"/>
  <text x="143" y="312" font-family="monospace" font-size="9" fill="#f87171" text-anchor="middle">Perplexity</text>
  <rect x="188" y="300" width="54" height="16" rx="8" fill="#1a0f0a" stroke="#ef4444" stroke-width="0.8"/>
  <text x="215" y="312" font-family="monospace" font-size="9" fill="#f87171" text-anchor="middle">Python</text>
  <rect x="250" y="300" width="52" height="16" rx="8" fill="#1a0f0a" stroke="#ef4444" stroke-width="0.8"/>
  <text x="276" y="312" font-family="monospace" font-size="9" fill="#f87171" text-anchor="middle">RAG</text>
</svg>