<svg width="800" height="320" viewBox="0 0 800 320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1a12"/>
      <stop offset="50%" style="stop-color:#0d1f18"/>
      <stop offset="100%" style="stop-color:#0a1510"/>
    </linearGradient>
    <linearGradient id="accent3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#6d28d9"/>
    </linearGradient>
    <linearGradient id="heartgrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
    <filter id="blur3">
      <feGaussianBlur stdDeviation="20"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="320" fill="url(#bg3)" rx="16"/>

  <!-- Glow blobs -->
  <ellipse cx="680" cy="160" rx="140" ry="120" fill="#10b981" opacity="0.07" filter="url(#blur3)"/>
  <ellipse cx="80" cy="280" rx="100" ry="80" fill="#059669" opacity="0.08" filter="url(#blur3)"/>

  <!-- ECG / heartbeat line (right side) -->
  <polyline points="480,160 520,160 535,110 550,200 565,130 580,180 610,180 640,180 660,100 680,220 700,140 720,180 800,180"
    fill="none" stroke="#10b981" stroke-width="2" opacity="0.5"/>
  <!-- Pulse dot -->
  <circle cx="660" cy="100" r="4" fill="#10b981" opacity="0.9"/>
  <!-- Glow on pulse -->
  <circle cx="660" cy="100" r="10" fill="#10b981" opacity="0.15"/>

  <!-- Heart icon (right) -->
  <g transform="translate(660, 230) scale(2.2)">
    <path d="M0,-8 C-2,-12 -9,-12 -9,-5 C-9,0 0,8 0,8 C0,8 9,0 9,-5 C9,-12 2,-12 0,-8 Z"
      fill="#10b981" opacity="0.25"/>
    <path d="M0,-8 C-2,-12 -9,-12 -9,-5 C-9,0 0,8 0,8 C0,8 9,0 9,-5 C9,-12 2,-12 0,-8 Z"
      fill="none" stroke="#10b981" stroke-width="1.2" opacity="0.8"/>
  </g>

  <!-- Role nodes -->
  <circle cx="560" cy="250" r="22" fill="#0a1a12" stroke="#10b981" stroke-width="1.2" opacity="0.9"/>
  <text x="560" y="247" font-family="monospace" font-size="8" fill="#6ee7b7" text-anchor="middle">🧑‍⚕️</text>
  <text x="560" y="260" font-family="monospace" font-size="7" fill="#6ee7b7" text-anchor="middle">Therapist</text>

  <circle cx="620" cy="270" r="22" fill="#0a1a12" stroke="#10b981" stroke-width="1.2" opacity="0.9"/>
  <text x="620" y="267" font-family="monospace" font-size="8" fill="#6ee7b7" text-anchor="middle">🤝</text>
  <text x="620" y="280" font-family="monospace" font-size="7" fill="#6ee7b7" text-anchor="middle">NGO</text>

  <circle cx="680" cy="258" r="22" fill="#0a1a12" stroke="#10b981" stroke-width="1.2" opacity="0.9"/>
  <text x="680" y="255" font-family="monospace" font-size="8" fill="#6ee7b7" text-anchor="middle">🙋</text>
  <text x="680" y="268" font-family="monospace" font-size="7" fill="#6ee7b7" text-anchor="middle">User</text>

  <!-- Connection lines between nodes -->
  <line x1="582" y1="255" x2="598" y2="265" stroke="#10b981" stroke-width="1" opacity="0.4" stroke-dasharray="3,2"/>
  <line x1="642" y1="265" x2="658" y2="260" stroke="#10b981" stroke-width="1" opacity="0.4" stroke-dasharray="3,2"/>

  <!-- Border -->
  <rect width="800" height="320" fill="none" stroke="#10b981" stroke-width="1.5" rx="16" opacity="0.35"/>
  <rect x="0" y="0" width="800" height="3" fill="url(#accent3)" rx="2" opacity="0.9"/>

  <!-- Tag -->
  <rect x="30" y="28" width="170" height="24" rx="12" fill="#071a0f" stroke="#10b981" stroke-width="1"/>
  <text x="115" y="44" font-family="monospace" font-size="11" fill="#34d399" text-anchor="middle">💚 Backend · MongoDB · REST</text>

  <!-- Title -->
  <text x="30" y="100" font-family="'Courier New', monospace" font-size="30" font-weight="bold" fill="#ffffff" letter-spacing="1">HealTogether</text>
  <text x="30" y="126" font-family="monospace" font-size="13" fill="#6ee7b7" opacity="0.8">Mental Health Platform</text>

  <!-- Divider -->
  <rect x="30" y="140" width="320" height="1.5" fill="url(#accent3)" rx="1" opacity="0.6"/>

  <!-- STAR content -->
  <text x="30" y="165" font-family="monospace" font-size="11" fill="#10b981" font-weight="bold">📍 SITUATION</text>
  <text x="30" y="181" font-family="monospace" font-size="10.5" fill="#a7f3d0" opacity="0.85">Mental health platforms are fragmented — therapists,</text>
  <text x="30" y="196" font-family="monospace" font-size="10.5" fill="#a7f3d0" opacity="0.85">NGOs, and users lacked a unified secure space.</text>

  <text x="30" y="218" font-family="monospace" font-size="11" fill="#10b981" font-weight="bold">⚙️  ACTION</text>
  <text x="30" y="234" font-family="monospace" font-size="10.5" fill="#a7f3d0" opacity="0.85">▸ MongoDB schema for 3 distinct user roles</text>
  <text x="30" y="249" font-family="monospace" font-size="10.5" fill="#a7f3d0" opacity="0.85">▸ Secured RESTful APIs with role-based authorization</text>

  <text x="30" y="272" font-family="monospace" font-size="11" fill="#22c55e" font-weight="bold">✅ RESULT</text>
  <text x="30" y="288" font-family="monospace" font-size="10.5" fill="#86efac" opacity="0.9">1000+ concurrent users · &lt;200ms avg API response time</text>

  <!-- Tech pills -->
  <rect x="30" y="300" width="58" height="16" rx="8" fill="#071a0f" stroke="#10b981" stroke-width="0.8"/>
  <text x="59" y="312" font-family="monospace" font-size="9" fill="#34d399" text-anchor="middle">Node.js</text>
  <rect x="96" y="300" width="60" height="16" rx="8" fill="#071a0f" stroke="#10b981" stroke-width="0.8"/>
  <text x="126" y="312" font-family="monospace" font-size="9" fill="#34d399" text-anchor="middle">MongoDB</text>
  <rect x="164" y="300" width="44" height="16" rx="8" fill="#071a0f" stroke="#10b981" stroke-width="0.8"/>
  <text x="186" y="312" font-family="monospace" font-size="9" fill="#34d399" text-anchor="middle">React</text>
  <rect x="216" y="300" width="66" height="16" rx="8" fill="#071a0f" stroke="#10b981" stroke-width="0.8"/>
  <text x="249" y="312" font-family="monospace" font-size="9" fill="#34d399" text-anchor="middle">REST APIs</text>
</svg>
