<svg width="800" height="320" viewBox="0 0 800 320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0a0a"/>
      <stop offset="50%" style="stop-color:#1f1010"/>
      <stop offset="100%" style="stop-color:#150a0a"/>
    </linearGradient>
    <linearGradient id="accent4" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <linearGradient id="bargrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:0.9"/>
    </linearGradient>
    <linearGradient id="bargrad2" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#a78bfa;stop-opacity:0.9"/>
    </linearGradient>
    <filter id="blur4">
      <feGaussianBlur stdDeviation="20"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="320" fill="url(#bg4)" rx="16"/>

  <!-- Glow blobs -->
  <ellipse cx="660" cy="140" rx="140" ry="100" fill="#f59e0b" opacity="0.06" filter="url(#blur4)"/>
  <ellipse cx="100" cy="200" rx="120" ry="90" fill="#7c3aed" opacity="0.08" filter="url(#blur4)"/>

  <!-- Dashboard mockup (right side) -->
  <!-- Dashboard card frame -->
  <rect x="470" y="40" width="300" height="240" rx="10" fill="#1a0a0a" stroke="#f59e0b" stroke-width="1" opacity="0.8"/>

  <!-- Dashboard header bar -->
  <rect x="470" y="40" width="300" height="28" rx="10" fill="#2a1200" opacity="0.9"/>
  <rect x="470" y="54" width="300" height="14" fill="#2a1200" opacity="0.9"/>
  <circle cx="490" cy="54" r="5" fill="#ef4444" opacity="0.7"/>
  <circle cx="505" cy="54" r="5" fill="#f59e0b" opacity="0.7"/>
  <circle cx="520" cy="54" r="5" fill="#22c55e" opacity="0.7"/>
  <text x="620" y="60" font-family="monospace" font-size="9" fill="#fbbf24" text-anchor="middle" opacity="0.8">UCCD Dashboard</text>

  <!-- Bar chart inside dashboard -->
  <rect x="490" y="155" width="20" height="80" fill="url(#bargrad)" rx="3"/>
  <rect x="518" y="130" width="20" height="105" fill="url(#bargrad)" rx="3"/>
  <rect x="546" y="170" width="20" height="65" fill="url(#bargrad2)" rx="3"/>
  <rect x="574" y="140" width="20" height="95" fill="url(#bargrad)" rx="3"/>
  <rect x="602" y="160" width="20" height="75" fill="url(#bargrad2)" rx="3"/>
  <rect x="630" y="120" width="20" height="115" fill="url(#bargrad)" rx="3"/>
  <rect x="658" y="150" width="20" height="85" fill="url(#bargrad2)" rx="3"/>
  <rect x="686" y="135" width="20" height="100" fill="url(#bargrad)" rx="3"/>
  <rect x="714" y="145" width="20" height="90" fill="url(#bargrad2)" rx="3"/>
  <rect x="742" y="120" width="20" height="115" fill="url(#bargrad)" rx="3"/>

  <!-- Chart baseline -->
  <line x1="485" y1="235" x2="765" y2="235" stroke="#f59e0b" stroke-width="0.8" opacity="0.3"/>

  <!-- Mini stat cards at top of dashboard -->
  <rect x="486" y="76" width="80" height="40" rx="5" fill="#2a1200" stroke="#f59e0b" stroke-width="0.8" opacity="0.7"/>
  <text x="526" y="91" font-family="monospace" font-size="7.5" fill="#fbbf24" text-anchor="middle" opacity="0.7">Resolved</text>
  <text x="526" y="107" font-family="monospace" font-size="12" font-weight="bold" fill="#f59e0b" text-anchor="middle">2,847</text>

  <rect x="576" y="76" width="80" height="40" rx="5" fill="#1e1255" stroke="#7c3aed" stroke-width="0.8" opacity="0.7"/>
  <text x="616" y="91" font-family="monospace" font-size="7.5" fill="#a78bfa" text-anchor="middle" opacity="0.7">Pending</text>
  <text x="616" y="107" font-family="monospace" font-size="12" font-weight="bold" fill="#a78bfa" text-anchor="middle">143</text>

  <rect x="666" y="76" width="80" height="40" rx="5" fill="#072a18" stroke="#10b981" stroke-width="0.8" opacity="0.7"/>
  <text x="706" y="91" font-family="monospace" font-size="7.5" fill="#34d399" text-anchor="middle" opacity="0.7">Platforms</text>
  <text x="706" y="107" font-family="monospace" font-size="12" font-weight="bold" fill="#10b981" text-anchor="middle">5+</text>

  <!-- In Progress badge -->
  <rect x="470" y="270" width="300" height="10" rx="0" fill="#2a1200" opacity="0.5"/>
  <rect x="470" y="270" width="180" height="10" rx="0" fill="#f59e0b" opacity="0.35"/>
  <text x="760" y="280" font-family="monospace" font-size="7" fill="#fbbf24" text-anchor="end" opacity="0.7">60% complete</text>

  <!-- Border -->
  <rect width="800" height="320" fill="none" stroke="#f59e0b" stroke-width="1.5" rx="16" opacity="0.35"/>
  <rect x="0" y="0" width="800" height="3" fill="url(#accent4)" rx="2" opacity="0.9"/>

  <!-- In Progress pill -->
  <rect x="30" y="28" width="100" height="22" rx="11" fill="#2a1200" stroke="#f59e0b" stroke-width="1"/>
  <circle cx="47" cy="39" r="4" fill="#f59e0b" opacity="0.9"/>
  <circle cx="47" cy="39" r="7" fill="#f59e0b" opacity="0.15"/>
  <text x="75" y="43" font-family="monospace" font-size="9.5" fill="#fbbf24" text-anchor="middle">In Progress</text>

  <!-- Title -->
  <text x="30" y="100" font-family="'Courier New', monospace" font-size="28" font-weight="bold" fill="#ffffff" letter-spacing="1">UCCD</text>
  <text x="30" y="126" font-family="monospace" font-size="13" fill="#fcd34d" opacity="0.8">Unified Customer Complaint Dashboard</text>

  <!-- Divider -->
  <rect x="30" y="140" width="340" height="1.5" fill="url(#accent4)" rx="1" opacity="0.6"/>

  <!-- STAR content -->
  <text x="30" y="165" font-family="monospace" font-size="11" fill="#f59e0b" font-weight="bold">📍 SITUATION</text>
  <text x="30" y="181" font-family="monospace" font-size="10.5" fill="#fde68a" opacity="0.85">Complaints scattered across email, social, portals —</text>
  <text x="30" y="196" font-family="monospace" font-size="10.5" fill="#fde68a" opacity="0.85">no unified view causing missed escalations.</text>

  <text x="30" y="218" font-family="monospace" font-size="11" fill="#f59e0b" font-weight="bold">⚙️  ACTION</text>
  <text x="30" y="234" font-family="monospace" font-size="10.5" fill="#fde68a" opacity="0.85">▸ React dashboard + FastAPI/Node.js ingestion backend</text>
  <text x="30" y="249" font-family="monospace" font-size="10.5" fill="#fde68a" opacity="0.85">▸ NLP sentiment analysis · NeonDB · Dockerized</text>

  <text x="30" y="272" font-family="monospace" font-size="11" fill="#22c55e" font-weight="bold">✅ RESULT</text>
  <text x="30" y="288" font-family="monospace" font-size="10.5" fill="#86efac" opacity="0.9">Target: 40% faster resolution · 5+ platforms unified</text>

  <!-- Tech pills -->
  <rect x="30" y="300" width="44" height="16" rx="8" fill="#1a0a0a" stroke="#f59e0b" stroke-width="0.8"/>
  <text x="52" y="312" font-family="monospace" font-size="9" fill="#fbbf24" text-anchor="middle">React</text>
  <rect x="82" y="300" width="56" height="16" rx="8" fill="#1a0a0a" stroke="#f59e0b" stroke-width="0.8"/>
  <text x="110" y="312" font-family="monospace" font-size="9" fill="#fbbf24" text-anchor="middle">FastAPI</text>
  <rect x="146" y="300" width="52" height="16" rx="8" fill="#1a0a0a" stroke="#f59e0b" stroke-width="0.8"/>
  <text x="172" y="312" font-family="monospace" font-size="9" fill="#fbbf24" text-anchor="middle">NeonDB</text>
  <rect x="206" y="300" width="44" height="16" rx="8" fill="#1a0a0a" stroke="#f59e0b" stroke-width="0.8"/>
  <text x="228" y="312" font-family="monospace" font-size="9" fill="#fbbf24" text-anchor="middle">Docker</text>
  <rect x="258" y="300" width="36" height="16" rx="8" fill="#1a0a0a" stroke="#f59e0b" stroke-width="0.8"/>
  <text x="276" y="312" font-family="monospace" font-size="9" fill="#fbbf24" text-anchor="middle">NLP</text>
</svg>
