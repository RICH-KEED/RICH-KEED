<svg width="800" height="320" viewBox="0 0 800 320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628"/>
      <stop offset="50%" style="stop-color:#0d1f3a"/>
      <stop offset="100%" style="stop-color:#0a1220"/>
    </linearGradient>
    <linearGradient id="accent2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0ea5e9"/>
      <stop offset="100%" style="stop-color:#6d28d9"/>
    </linearGradient>
    <linearGradient id="earth1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1d4ed8"/>
      <stop offset="50%" style="stop-color:#166534"/>
      <stop offset="100%" style="stop-color:#1d4ed8"/>
    </linearGradient>
    <filter id="blur2">
      <feGaussianBlur stdDeviation="20"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="320" fill="url(#bg2)" rx="16"/>

  <!-- Glow blobs -->
  <ellipse cx="680" cy="200" rx="140" ry="120" fill="#0ea5e9" opacity="0.08" filter="url(#blur2)"/>
  <ellipse cx="120" cy="80" rx="120" ry="90" fill="#1d4ed8" opacity="0.1" filter="url(#blur2)"/>

  <!-- Grid overlay (satellite view effect) -->
  <g opacity="0.08" stroke="#0ea5e9" stroke-width="0.8">
    <line x1="500" y1="0" x2="500" y2="320"/>
    <line x1="560" y1="0" x2="560" y2="320"/>
    <line x1="620" y1="0" x2="620" y2="320"/>
    <line x1="680" y1="0" x2="680" y2="320"/>
    <line x1="740" y1="0" x2="740" y2="320"/>
    <line x1="800" y1="0" x2="800" y2="320"/>
    <line x1="500" y1="60" x2="800" y2="60"/>
    <line x1="500" y1="120" x2="800" y2="120"/>
    <line x1="500" y1="180" x2="800" y2="180"/>
    <line x1="500" y1="240" x2="800" y2="240"/>
    <line x1="500" y1="300" x2="800" y2="300"/>
  </g>

  <!-- Change detection highlight boxes on grid -->
  <rect x="560" y="120" width="60" height="60" fill="#ef4444" opacity="0.15" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="4,2"/>
  <rect x="620" y="60" width="60" height="60" fill="#22c55e" opacity="0.15" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="4,2"/>
  <rect x="680" y="180" width="60" height="60" fill="#ef4444" opacity="0.12" stroke="#ef4444" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- Change labels -->
  <text x="590" y="155" font-family="monospace" font-size="9" fill="#ef4444" text-anchor="middle" opacity="0.9">CHANGE</text>
  <text x="650" y="95" font-family="monospace" font-size="9" fill="#22c55e" text-anchor="middle" opacity="0.9">STABLE</text>

  <!-- Earth circle -->
  <circle cx="690" cy="80" r="55" fill="url(#earth1)" opacity="0.7"/>
  <circle cx="690" cy="80" r="55" fill="none" stroke="#0ea5e9" stroke-width="1.5" opacity="0.6"/>
  <!-- Continent blobs -->
  <ellipse cx="678" cy="68" rx="22" ry="16" fill="#166534" opacity="0.7"/>
  <ellipse cx="700" cy="88" rx="14" ry="10" fill="#166534" opacity="0.6"/>
  <ellipse cx="665" cy="88" rx="8" ry="6" fill="#166534" opacity="0.5"/>
  <!-- Atmosphere glow -->
  <circle cx="690" cy="80" r="62" fill="none" stroke="#0ea5e9" stroke-width="3" opacity="0.15"/>
  <circle cx="690" cy="80" r="68" fill="none" stroke="#0ea5e9" stroke-width="1" opacity="0.08"/>

  <!-- Scan line over earth -->
  <line x1="635" y1="55" x2="745" y2="105" stroke="#0ea5e9" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.6"/>

  <!-- Border -->
  <rect width="800" height="320" fill="none" stroke="#0ea5e9" stroke-width="1.5" rx="16" opacity="0.4"/>
  <rect x="0" y="0" width="800" height="3" fill="url(#accent2)" rx="2" opacity="0.9"/>

  <!-- Tag -->
  <rect x="30" y="28" width="160" height="24" rx="12" fill="#0c1a2e" stroke="#0ea5e9" stroke-width="1"/>
  <text x="110" y="44" font-family="monospace" font-size="11" fill="#38bdf8" text-anchor="middle">🌍 CV · Deep Learning · ML</text>

  <!-- Title -->
  <text x="30" y="100" font-family="'Courier New', monospace" font-size="30" font-weight="bold" fill="#ffffff" letter-spacing="1">NanSat</text>
  <text x="30" y="126" font-family="monospace" font-size="13" fill="#7dd3fc" opacity="0.8">Satellite Change Detection</text>

  <!-- Divider -->
  <rect x="30" y="140" width="320" height="1.5" fill="url(#accent2)" rx="1" opacity="0.6"/>

  <!-- STAR content -->
  <text x="30" y="165" font-family="monospace" font-size="11" fill="#0ea5e9" font-weight="bold">📍 SITUATION</text>
  <text x="30" y="181" font-family="monospace" font-size="10.5" fill="#bae6fd" opacity="0.85">Manual multi-temporal satellite analysis was slow,</text>
  <text x="30" y="196" font-family="monospace" font-size="10.5" fill="#bae6fd" opacity="0.85">inconsistent and unscalable for large geospatial datasets.</text>

  <text x="30" y="218" font-family="monospace" font-size="11" fill="#0ea5e9" font-weight="bold">⚙️  ACTION</text>
  <text x="30" y="234" font-family="monospace" font-size="10.5" fill="#bae6fd" opacity="0.85">▸ Encoder–decoder models on multi-temporal imagery</text>
  <text x="30" y="249" font-family="monospace" font-size="10.5" fill="#bae6fd" opacity="0.85">▸ Preprocessing pipelines · IoU + F1-score evaluation</text>

  <text x="30" y="272" font-family="monospace" font-size="11" fill="#22c55e" font-weight="bold">✅ RESULT</text>
  <text x="30" y="288" font-family="monospace" font-size="10.5" fill="#86efac" opacity="0.9">Target &gt;85% F1-score · ~60% faster data setup pipeline</text>

  <!-- Tech pills -->
  <rect x="30" y="300" width="68" height="16" rx="8" fill="#0c1a2e" stroke="#0ea5e9" stroke-width="0.8"/>
  <text x="64" y="312" font-family="monospace" font-size="9" fill="#38bdf8" text-anchor="middle">TensorFlow</text>
  <rect x="106" y="300" width="55" height="16" rx="8" fill="#0c1a2e" stroke="#0ea5e9" stroke-width="0.8"/>
  <text x="133" y="312" font-family="monospace" font-size="9" fill="#38bdf8" text-anchor="middle">PyTorch</text>
  <rect x="169" y="300" width="82" height="16" rx="8" fill="#0c1a2e" stroke="#0ea5e9" stroke-width="0.8"/>
  <text x="210" y="312" font-family="monospace" font-size="9" fill="#38bdf8" text-anchor="middle">Computer Vision</text>
  <rect x="259" y="300" width="50" height="16" rx="8" fill="#0c1a2e" stroke="#0ea5e9" stroke-width="0.8"/>
  <text x="284" y="312" font-family="monospace" font-size="9" fill="#38bdf8" text-anchor="middle">Python</text>
</svg>
